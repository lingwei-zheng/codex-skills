name: codex_ppt
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Keep Cairo and pycairo in Conda, especially on macOS arm64. Installing
  # svglib/rlpycairo through pip can otherwise try to build pycairo from
  # source and fail when system cairo/pkg-config are missing.
  - cairo
  - pkg-config
  - pycairo
  - pandoc
  # Needed for recorded narration timing checks via ffprobe.
  - ffmpeg
  - pip:
      - python-pptx>=0.6.21
      - edge-tts>=7.2.8
      - cairosvg>=2.9.0
      - svglib>=1.5.0
      - reportlab>=4.0.0
      - PyMuPDF>=1.23.0
      - mammoth>=1.6.0
      - markdownify>=0.11.6
      - ebooklib>=0.18
      - nbconvert>=7.0.0
      - openpyxl>=3.1.0
      - Pillow>=9.0.0
      - numpy>=1.20.0
      - requests>=2.31.0
      - beautifulsoup4>=4.12.0
      - curl_cffi>=0.7.0
      - google-genai>=1.0.0
      - openai>=1.0.0
      - flask>=3.0.0
